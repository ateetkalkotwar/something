<!DOCTYPE html>
<html>

<head>
    <title>3D Product Viewer</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
</head>

<body>

<h2>3D Product Viewer</h2>

<h3>Upload Images</h3>

Front:
<input type="file" id="front"><br><br>

Back:
<input type="file" id="back"><br><br>

Left:
<input type="file" id="left"><br><br>

Right:
<input type="file" id="right"><br><br>

Top:
<input type="file" id="top"><br><br>

Bottom:
<input type="file" id="bottom"><br><br>

<script>

// ---------------- SCENE ----------------

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

// ---------------- CAMERA ----------------

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.z = 8;

// ---------------- RENDERER ----------------

const renderer = new THREE.WebGLRenderer({
    antialias: true
});

renderer.setPixelRatio(
    window.devicePixelRatio
);

renderer.outputEncoding =
THREE.sRGBEncoding;

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

// ---------------- LIGHTS ----------------

// ---------------- LIGHTS ----------------

const ambientLight =
new THREE.AmbientLight(
    0xffffff,
    0.35
);

scene.add(ambientLight);

const directionalLight =
new THREE.DirectionalLight(
    0xffffff,
    0.8
);

directionalLight.position.set(
    5,
    5,
    5
);

scene.add(directionalLight);

const backLight =
new THREE.DirectionalLight(
    0xffffff,
    0.4
);

backLight.position.set(
    -5,
    2,
    -5
);

scene.add(backLight);
// ---------------- MATERIALS ----------------

const materials = [

    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    new THREE.MeshBasicMaterial({ color: 0xffffff }),
    new THREE.MeshBasicMaterial({ color: 0xffffff })

];

// ---------------- GEOMETRY ----------------

const geometry = new THREE.BoxGeometry(
    4,
    4,
    4
);

// ---------------- MESH ----------------

const frame = new THREE.Mesh(
    geometry,
    materials
);

scene.add(frame);

// ---------------- ORBIT CONTROLS ----------------

const controls = new THREE.OrbitControls(
    camera,
    renderer.domElement
);

controls.enablePan = false;
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 4;
controls.maxDistance = 12;

// ---------------- IMAGE UPLOAD ----------------

function uploadTexture(inputId, faceIndex){

    document
    .getElementById(inputId)
    .addEventListener(
        "change",
        function(event){

            const file =
            event.target.files[0];

            if(!file) return;

            const reader =
            new FileReader();

            reader.onload =
            function(e){

                const texture =
                new THREE.TextureLoader().load(
                    e.target.result,
                    function(){

                        texture.anisotropy =
                        renderer.capabilities.getMaxAnisotropy();

                        texture.wrapS =
                        THREE.ClampToEdgeWrapping;

                        texture.wrapT =
                        THREE.ClampToEdgeWrapping;

                        texture.generateMipmaps =
                        true;

                        texture.minFilter =
                        THREE.LinearMipmapLinearFilter;

                        texture.magFilter =
                        THREE.LinearFilter;

                        texture.needsUpdate =
                        true;

                        frame.material[faceIndex].map =
                        texture;

                        frame.material[faceIndex]
                        .needsUpdate = true;

                    }
                );

            };

            reader.readAsDataURL(file);

        }
    );
}

// ---------------- FACE MAPPING ----------------

uploadTexture("right", 0);
uploadTexture("left", 1);
uploadTexture("top", 2);
uploadTexture("bottom", 3);
uploadTexture("front", 4);
uploadTexture("back", 5);

// ---------------- RESPONSIVE ----------------

window.addEventListener(
    "resize",
    () => {

        camera.aspect =
        window.innerWidth /
        window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

// ---------------- ANIMATION ----------------

function animate(){

    requestAnimationFrame(
        animate
    );

    controls.update();

    renderer.render(
        scene,
        camera
    );

}

animate();

</script>

</body>
</html>
